# ==================== Docker Compose 编排文件 ====================
# 包含 MCP 服务器和 Nginx 反向代理

services:
  # ---- MCP 服务器 ----
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MCP_SERVER_NAME=mcp-real-server
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
      - MCP_TRANSPORT=sse
      - MCP_LOG_LEVEL=INFO
      - ENABLE_WEATHER_TOOL=true
      - ENABLE_CALCULATOR_TOOL=true
      - ENABLE_TEXT_TOOL=true
      - ENABLE_WEB_SEARCH_TOOL=true
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  # ---- Nginx 反向代理 (生产环境) ----
  nginx:
    image: nginx:alpine
    container_name: mcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 如需 SSL，取消下面的注释并放入证书
      # - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - mcp-network
    profiles:
      - production

networks:
  mcp-network:
    driver: bridge
